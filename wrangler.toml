name = "chat"
compatibility_date = "2026-03-01"

# Cloudflare Pages will serve the static build output in ./dist
pages_build_output_dir = "dist"
main = "functions/_worker.js"

[durable_objects]
bindings = [{ name = "CHAT_ROOM", class_name = "ChatRoom" }]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

